    <style>
        .countries-wrap {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 16px 40px;
        }

        .countries-wrap h1 {
            font-size: 1.4rem;
            font-weight: 500;
            color: #f0f0f0;
            margin-bottom: 18px;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 180px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
            background: #2a2a2a;
            color: #f0f0f0;
            font-family: 'SUSE', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color .15s;
        }
        .search-input:focus { border-color: #20c997; }
        .search-input::placeholder { color: #666; }

        .reset-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid #3a3a3a;
            background: transparent;
            color: #888;
            font-family: 'SUSE', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: border-color .15s, color .15s;
            white-space: nowrap;
        }
        .reset-btn:hover { border-color: #ff7f50; color: #ff7f50; }

        /* Filter pills */
        .filter-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .filter-btn {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #3a3a3a;
            background: #2a2a2a;
            color: #888;
            font-family: 'SUSE', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: #20c997;
            color: #1e1e1e;
            border-color: #20c997;
        }
        .filter-btn:hover:not(.active) {
            border-color: #20c997;
            color: #20c997;
        }

        /* Progress */
        .progress-wrap { margin-bottom: 18px; }
        .progress-label { font-size: 0.75rem; color: #888; margin-bottom: 5px; }
        .progress-track {
            height: 6px;
            background: #2a2a2a;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #3a3a3a;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #20c997, #ff7f50);
            border-radius: 3px;
            transition: width .3s;
        }

        /* Region blocks */
        .region-block { margin-bottom: 24px; }
        .region-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 6px 0 6px 12px;
        }
        .region-title { font-size: 0.8rem; font-weight: 600; color: #f0f0f0; }
        .region-count { font-size: 0.7rem; color: #888; }

        /* Flag grid */
        .flags-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 6px;
        }

        .flag-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 6px 7px;
            border-radius: 10px;
            border: 1px solid #3a3a3a;
            background: #2a2a2a;
            cursor: pointer;
            transition: border-color .15s, background .15s, transform .15s;
            user-select: none;
        }
        .flag-card:hover {
            border-color: #20c997;
            background: #333;
            transform: scale(1.04);
        }
        .flag-card.learned {
            opacity: .3;
        }

        .flag-emoji { font-size: 32px; line-height: 1; }

        .flag-svg-wrap {
            width: 48px;
            height: 32px;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #3a3a3a;
            flex-shrink: 0;
        }

        .flag-name {
            font-size: 0.68rem;
            font-weight: 600;
            color: #f0f0f0;
            text-align: center;
            line-height: 1.3;
        }
        .flag-capital {
            font-size: 0.62rem;
            color: #888;
            text-align: center;
            line-height: 1.3;
        }

        .empty {
            color: #888;
            font-size: 0.85rem;
            padding: 32px;
            text-align: center;
        }

        /* Light mode overrides */
        body.light-mode .countries-wrap h1 { color: #1e1e1e; }
        body.light-mode .search-input { background: #e0e0e0; border-color: #ccc; color: #1e1e1e; }
        body.light-mode .search-input::placeholder { color: #999; }
        body.light-mode .reset-btn { border-color: #ccc; color: #666; }
        body.light-mode .filter-btn { background: #e0e0e0; border-color: #ccc; color: #555; }
        body.light-mode .filter-btn.active { background: #20c997; color: #1e1e1e; border-color: #20c997; }
        body.light-mode .progress-track { background: #e0e0e0; border-color: #ccc; }
        body.light-mode .region-title { color: #1e1e1e; }
        body.light-mode .region-count { color: #666; }
        body.light-mode .flag-card { background: #e8e8e8; border-color: #ccc; }
        body.light-mode .flag-card:hover { background: #f0f0f0; border-color: #20c997; }
        body.light-mode .flag-name { color: #1e1e1e; }
        body.light-mode .flag-capital { color: #666; }
        body.light-mode .progress-label { color: #666; }
        body.light-mode .empty { color: #666; }
    </style>

      ]},
    ];

    let learned = new Set();
    try { learned = new Set(JSON.parse(localStorage.getItem('flags_learned')||'[]')); } catch(e){}
    let activeRegion = "All";

    function totalCountries() { return REGIONS.reduce((a,r)=>a+r.countries.length,0); }
    function saveLearn() { try { localStorage.setItem('flags_learned', JSON.stringify([...learned])); } catch(e){} }

    function resetLearned() {
      if (!confirm('Reset all progress?')) return;
      learned = new Set();
      saveLearn();
      render();
    }

    function buildFilters() {
      const wrap = document.getElementById('filter-btns');
      const all = ["All", ...REGIONS.map(r=>r.name)];
      wrap.innerHTML = all.map(r =>
        `<button class="filter-btn${r===activeRegion?' active':''}" onclick="setRegion('${r.replace(/'/g,"\\'")}')">
          ${r==="All"?"All":r.split(" ")[0]}
        </button>`
      ).join('');
    }

    function setRegion(r) { activeRegion = r; buildFilters(); render(); }

    function makeFlagContent(emoji, name) {
      if (name === "Afghanistan") {
        return `<div class="flag-svg-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 60" width="48" height="32">
            <rect width="90" height="60" fill="#ffffff"/>
            <rect x="2" y="2" width="86" height="56" fill="none" stroke="#cccccc" stroke-width="1"/>
            <text x="45" y="23" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial Unicode MS, Arial, sans-serif">لَا إِلٰهَ إِلَّا ٱللَّٰه</text>
            <line x1="10" y1="30" x2="80" y2="30" stroke="#1a1a1a" stroke-width="0.8" opacity="0.3"/>
            <text x="45" y="44" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial Unicode MS, Arial, sans-serif">مُحَمَّدٌ رَّسُولُ ٱللَّٰه</text>
          </svg>
        </div>`;
      }
      return `<span class="flag-emoji">${emoji}</span>`;
    }

    function render() {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const output = document.getElementById('output');
      const total = totalCountries();
      const lcount = learned.size;
      document.getElementById('prog-label').textContent = `${lcount} / ${total} learned — click a flag to mark it`;
      document.getElementById('prog-fill').style.width = (lcount/total*100)+'%';

      const regions = REGIONS.filter(r => activeRegion === "All" || r.name === activeRegion);
      let html = '';
      let anyVisible = false;
      regions.forEach(r => {
        const filtered = r.countries.filter(([,n,c]) => !query || n.toLowerCase().includes(query) || c.toLowerCase().includes(query));
        if(!filtered.length) return;
        anyVisible = true;
        html += `<div class="region-block">
          <div class="region-header" style="border-left:3px solid ${r.color}">
            <span class="region-title">${r.name}</span>
            <span class="region-count">&nbsp;· ${filtered.length} countries</span>
          </div>
          <div class="flags-grid">`;
        filtered.forEach(([emoji, name, capital]) => {
          const isLearned = learned.has(name);
          html += `<div class="flag-card${isLearned?' learned':''}" onclick="toggleLearn('${name.replace(/'/g,"\\'")}')">
            ${makeFlagContent(emoji, name)}
            <span class="flag-name">${name}</span>
            <span class="flag-capital">${capital}</span>
          </div>`;
        });
        html += `</div></div>`;
      });
      if(!anyVisible) html = `<div class="empty">No countries match "${query}"</div>`;
      output.innerHTML = html;
    }

    function toggleLearn(name) {
      if(learned.has(name)) learned.delete(name);
      else learned.add(name);
      saveLearn();
      render();
    }

    buildFilters();
    render();
    </script>
